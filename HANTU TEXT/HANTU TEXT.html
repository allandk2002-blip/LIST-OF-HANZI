<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Han Cloud v7</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
@font-face {
    font-family: 'FZKai';
    src: url('https://allandk2002-blip.github.io/LIST-OF-HANZI/HANTU%20TEXT/Fonts/Fang%20zheng%20Kai%20ti%20Font-Simplified%20Chinese.ttf') format('truetype');
}

body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #eee;
    margin-bottom: 80px;
}

.container {
    width: 90%;
    max-width: 900px;
    margin: auto;
    padding-top: 40px;
}

/* INPUT */
#input {
    width: 100%;
    min-height: 80px;
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 10px;
    outline: none;
}

mark.new {
    background: white;
    color: black;
}

/* buttons */
.buttons {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

button {
    padding: 8px 14px;
    background: #333;
    border: none;
    color: white;
    cursor: pointer;
}

/* GRID */
.grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
}

.card {
    position: relative;
    background: #1a1a1a;
    border: 1px solid #333;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    cursor: pointer;
    font-family: 'FZKai', 'KaiTi', 'STKaiti', serif;
}

.card.active {
    background: #fff;
    color: #000;
}

.shuffle-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #666;
    cursor: pointer;
}

/* PANEL */
.panel {
    margin-top: 20px;
    display: none;
    grid-template-columns: repeat(12, 1fr);
    gap: 5px;
}

.panel-item {
    position: relative;
    background: #1a1a1a;
    border: 1px solid #333;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: 'Roboto', sans-serif;
}

/* highlight panel */
.panel-item.highlight {
    background: #444;
    border-color: #fff;
}

.delete-btn {
    position: absolute;
    top: 0;
    right: 2px;
    font-size: 12px;
    color: red;
    display: none;
    cursor: pointer;
}

.panel-item:hover .delete-btn {
    display: block;
}

/* ===== RANDOM MODAL ===== */

.random-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.random-content {
    position: relative;
    width: 500px;
    height: 300px;
    background: #111;
    border: 1px solid #444;
    display: flex;
    align-items: center;
    justify-content: center;
}

.random-word {
    font-size: 120px;
    color: #fff;
    font-family: 'FZKai', 'KaiTi', 'STKaiti', serif;
}

.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    color: #aaa;
    cursor: pointer;
    user-select: none;
}

.arrow:hover {
    color: #fff;
}

.arrow.left {
    left: 10px;
}

.arrow.right {
    right: 10px;
}

.arrow.disabled {
    opacity: 0.3;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="container">

<div id="input" contenteditable="true"></div>

<div class="buttons">
    <button onclick="addText()">Thêm</button>
    <button onclick="render()">Shuffle</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="togglePanel()">Quản lý</button>
    <button onclick="copyAll()">Copy All</button>
    <button id="randomBtn">🎲 Random</button>
</div>

<div class="panel" id="panel"></div>
<div class="grid" id="grid"></div>

</div>

<div id="randomModal" class="random-modal">
    <div class="random-content">
        <div class="arrow left" id="prevBtn">❮</div>

        <div class="random-word" id="randomWord">字</div>

        <div class="arrow right" id="nextBtn">❯</div>
    </div>
</div>



<script>
let data = Array.from(new Set(JSON.parse(localStorage.getItem("hanzi")) || []));
let pinned = null;

function save() {
    localStorage.setItem("hanzi", JSON.stringify(data));
}

function isHan(char) {
    return /[\u4e00-\u9fff]/.test(char);
}

/* ===== HIGHLIGHT PANEL ===== */
function highlightPanelFromInput(text) {
    const chars = new Set([...text].filter(c => isHan(c)));

    document.querySelectorAll(".panel-item").forEach(cell => {
        const char = cell.textContent.replace("✕", "").trim();

        if (chars.has(char) && data.includes(char)) {
            cell.classList.add("highlight");
        } else {
            cell.classList.remove("highlight");
        }
    });
}

/* ===== INPUT ===== */
document.getElementById("input").addEventListener("input", () => {
    const el = document.getElementById("input");
    const text = el.innerText;

    let result = "";
    for (let char of text) {
        if (!isHan(char)) {
            result += char;
        } else if (!data.includes(char)) {
            result += `<mark class="new">${char}</mark>`;
        } else {
            result += char;
        }
    }

    el.innerHTML = result;

    highlightPanelFromInput(text);

    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
});

/* ===== ADD ===== */
function addText() {
    const text = document.getElementById("input").innerText;

    let arr = [...text].filter(c => isHan(c));

    data = Array.from(new Set([...data, ...arr]));

    save();
    render();
    renderPanel();

    document.getElementById("input").innerHTML = "";
}

/* ===== GRID ===== */
function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let display = [...data];

    if (pinned) {
        display = [pinned, ...display.filter(x => x !== pinned)];
    }

    display = display.sort(() => Math.random() - 0.5).slice(0, 60);

    display.forEach((item) => {
        const div = document.createElement("div");
        div.className = "card";
        div.textContent = item;

        const btn = document.createElement("div");
        btn.className = "shuffle-btn";

        btn.onclick = (e) => {
            e.stopPropagation();
            div.textContent = data[Math.floor(Math.random() * data.length)];
            div.appendChild(btn);
        };

        div.onclick = () => {
            div.classList.toggle("active");
        };

        div.appendChild(btn);
        grid.appendChild(div);
    });
}

/* ===== PANEL ===== */
function togglePanel() {
    const panel = document.getElementById("panel");
    panel.style.display = panel.style.display === "none" ? "grid" : "none";
}

function renderPanel() {
    const panel = document.getElementById("panel");
    panel.innerHTML = "";

    data.forEach((item, index) => {
        const cell = document.createElement("div");
        cell.className = "panel-item";
        cell.textContent = item;

        cell.onclick = () => {
            pinned = item;
            render();
        };

        const del = document.createElement("div");
        del.className = "delete-btn";
        del.textContent = "✕";

        del.onclick = (e) => {
            e.stopPropagation();
            data.splice(index, 1);
            data = Array.from(new Set(data));
            save();
            render();
            renderPanel();
        };

        cell.appendChild(del);
        panel.appendChild(cell);
    });
}

/* ===== COPY ===== */
function copyAll() {
    const text = data.join(" ");

    const textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);

    textarea.select();
    document.execCommand("copy");

    document.body.removeChild(textarea);

    alert("Đã copy!");
}

/* ===== CLEAR ===== */
function clearAll() {
    if (confirm("Xóa toàn bộ?")) {
        data = [];
        pinned = null;
        save();
        render();
        renderPanel();
    }
}

render();
renderPanel();
const randomBtn = document.getElementById("randomBtn");
const modal = document.getElementById("randomModal");
const wordEl = document.getElementById("randomWord");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

let words = [];
let history = [];
let currentIndex = -1;

function getWords() {
    const items = document.querySelectorAll(".panel-item");
    words = Array.from(items).map(el => el.textContent.trim()).filter(Boolean);
}

function getRandomWord() {
    if (words.length === 0) return "";

    let pool = words;

    if (words.length > 10 && history.length >= 10) {
        const recent = history.slice(-10);
        pool = words.filter(w => !recent.includes(w));
        if (pool.length === 0) pool = words;
    }

    return pool[Math.floor(Math.random() * pool.length)];
}

function showWord(word) {
    wordEl.textContent = word;
}

function updateButtons() {
    if (currentIndex <= 0) {
        prevBtn.classList.add("disabled");
    } else {
        prevBtn.classList.remove("disabled");
    }
}

function nextWord() {
    const word = getRandomWord();

    if (currentIndex < history.length - 1) {
        history = history.slice(0, currentIndex + 1);
    }

    history.push(word);
    currentIndex++;

    showWord(word);
    updateButtons();
}

function prevWord() {
    if (currentIndex <= 0) return;

    currentIndex--;
    showWord(history[currentIndex]);
    updateButtons();
}

randomBtn.onclick = () => {
    getWords();
    if (words.length === 0) return;

    modal.style.display = "flex";

    history = [];
    currentIndex = -1;

    nextWord();
};

nextBtn.onclick = nextWord;
prevBtn.onclick = prevWord;

modal.onclick = (e) => {
    if (e.target === modal) {
        modal.style.display = "none";
    }
};
</script>
</body>
</html>
