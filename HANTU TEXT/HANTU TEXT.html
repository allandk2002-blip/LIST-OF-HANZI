<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Han Cloud v2</title>

<style>

/* 🔥 NHÚNG FONT */
@font-face {
    font-family: 'FZKai';
    src: url('fonts/FZKai-Z03S.ttf') format('truetype');
}

body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #eee;
}

.container {
    width: 90%;
    max-width: 900px;
    margin: auto;
    padding-top: 20px;
}

textarea {
    width: 100%;
    height: 80px;
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 10px;
    font-size: 16px;
    resize: none;
}

.buttons {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

button {
    padding: 8px 14px;
    background: #333;
    border: none;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #555;
}

.grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

.card {
    background: #1a1a1a;
    border: 1px solid #333;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;

    /* 🔥 DÙNG FONT CỦA BẠN */
    font-family: 'FZKTPY', "Noto Serif SC", serif;

    cursor: pointer;
    user-select: text;
    transition: all 0.2s ease;
}

.card:hover {
    background: #222;
    transform: scale(1.05);
    box-shadow: 0 0 10px rgba(255,255,255,0.15);
}

.card.active {
    background: #fff;
    color: #000;
}

.context-menu {
    position: absolute;
    background: #222;
    border: 1px solid #444;
    padding: 5px 0;
    display: none;
    z-index: 1000;
}

.context-menu div {
    padding: 8px 16px;
    cursor: pointer;
}

.context-menu div:hover {
    background: #444;
}

</style>
</head>

<body>

<div class="container">

<textarea id="input" placeholder="Nhập chữ Hán... (dùng (学生))"></textarea>

<div class="buttons">
    <button onclick="addText()">Thêm</button>
    <button onclick="render()">Shuffle</button>
    <button onclick="clearAll()">Clear</button>
</div>

<div class="grid" id="grid"></div>

</div>

<div id="menu" class="context-menu">
    <div id="copyBtn">Copy</div>
    <div id="deleteBtn">Xóa</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("hanzi")) || [];
let currentTarget = null;

function save() {
    localStorage.setItem("hanzi", JSON.stringify(data));
}

function isHan(char) {
    return /[\u4e00-\u9fff]/.test(char);
}

function addText() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    let result = [];
    const regex = /\((.*?)\)|./g;
    let match;

    while ((match = regex.exec(input)) !== null) {
        if (match[1]) {
            if ([...match[1]].some(c => isHan(c))) {
                result.push(match[1]);
            }
        } else {
            if (isHan(match[0])) {
                result.push(match[0]);
            }
        }
    }

    data = [...new Set(data.concat(result))];

    save();
    render();
    document.getElementById("input").value = "";
}

function shuffleArray(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function clearAll() {
    if (confirm("Xóa toàn bộ?")) {
        data = [];
        save();
        render();
    }
}

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let uniqueData = [...new Set(data)];
    let display = shuffleArray(uniqueData).slice(0, 50);

    display.forEach((item) => {
        const div = document.createElement("div");
        div.className = "card";
        div.textContent = item;

        div.dataset.state = "0";

        div.onclick = () => {
            let state = div.dataset.state;

            if (state === "0") {
                div.classList.add("active");
                div.dataset.state = "1";
            } else {
                if (data.length > 0) {
                    let random = data[Math.floor(Math.random() * data.length)];
                    div.textContent = random;
                }
                div.classList.remove("active");
                div.dataset.state = "0";
            }
        };

        div.oncontextmenu = (e) => {
            e.preventDefault();
            currentTarget = div;

            const menu = document.getElementById("menu");
            menu.style.top = e.pageY + "px";
            menu.style.left = e.pageX + "px";
            menu.style.display = "block";
        };

        grid.appendChild(div);
    });
}

document.getElementById("copyBtn").onclick = () => {
    if (!currentTarget) return;
    navigator.clipboard.writeText(currentTarget.textContent);
    hideMenu();
};

document.getElementById("deleteBtn").onclick = () => {
    if (!currentTarget) return;

    let value = currentTarget.textContent;
    data = data.filter(v => v !== value);
    save();
    render();
    hideMenu();
};

function hideMenu() {
    document.getElementById("menu").style.display = "none";
}

window.onclick = () => hideMenu();

render();
</script>

</body>
</html>
