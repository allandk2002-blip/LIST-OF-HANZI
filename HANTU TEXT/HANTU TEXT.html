<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Han Cloud v2</title>

<style>
@font-face {
    font-family: 'FZKai';
    src: url('https://allandk2002-blip.github.io/LIST-OF-HANZI/HANTU%20TEXT/Fonts/Fang%20zheng%20Kai%20ti%20Font-Simplified%20Chinese.ttf') format('truetype');
}

body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #eee;
    margin-bottom: 80px;
}

.container {
    width: 90%;
    max-width: 900px;
    margin: auto;
    padding-top: 40px;
    padding-bottom: 40px;
}

textarea {
    width: 100%;
    height: 80px;
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 10px;
}

.buttons {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

button {
    padding: 8px 14px;
    background: #333;
    border: none;
    color: white;
    cursor: pointer;
}

.grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}


.card {
    position: relative;
    background: #1a1a1a;
    border: 1px solid #333;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-family: 'FZKai', serif;
    cursor: pointer;
}

.card.active {
    background: #fff;
    color: #000;
}

/* chữ */
.char {
    pointer-events: none;
}

/* nút tròn */
.shuffle-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #666;
    cursor: pointer;
}

.shuffle-btn:hover {
    background: #aaa;
}

/* PANEL GRID */
.panel {
    margin-top: 20px;
    margin-bottom: 10px; /* thêm dòng này */
    display: none;
    gap: 5px;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
}

.panel-item {
    position: relative;
    background: #1a1a1a;
    border: 1px solid #333;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.panel-item input {
    width: 100%;
    height: 100%;
    background: #222;
    color: #fff;
    border: none;
    text-align: center;
}

/* nút xóa */
.delete-btn {
    position: absolute;
    top: 0;
    right: 2px;
    font-size: 12px;
    color: red;
    display: none;
    cursor: pointer;
}

.panel-item:hover .delete-btn {
    display: block;
}
</style>
</head>

<body>

<div class="container">

<textarea id="input" placeholder="Nhập chữ Hán..."></textarea>

<div class="buttons">
    <button onclick="addText()">Thêm</button>
    <button onclick="render()">Shuffle</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="togglePanel()">Quản lý</button>
</div>

<div class="panel" id="panel"></div>
<div class="grid" id="grid"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("hanzi")) || [];

function save() {
    localStorage.setItem("hanzi", JSON.stringify(data));
}

function isHan(char) {
    return /[\u4e00-\u9fff]/.test(char);
}

function addText() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    let result = [];
    const regex = /\((.*?)\)|./g;
    let match;

    while ((match = regex.exec(input)) !== null) {
        if (match[1]) {
            if ([...match[1]].some(c => isHan(c))) result.push(match[1]);
        } else {
            if (isHan(match[0])) result.push(match[0]);
        }
    }

    result = result.filter(r => !data.includes(r));
    data = data.concat(result);

    save();
    render();
    renderPanel();

    document.getElementById("input").value = "";
}

function shuffleArray(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let display = shuffleArray([...data]).slice(0, 50);

    display.forEach((item) => {
        const div = document.createElement("div");
        div.className = "card";

        const charSpan = document.createElement("span");
        charSpan.className = "char";
        charSpan.textContent = item;

        const btn = document.createElement("div");
        btn.className = "shuffle-btn";

        btn.onclick = (e) => {
            e.stopPropagation();
            charSpan.textContent = data[Math.floor(Math.random() * data.length)];
        };

        div.onclick = () => {
            div.classList.toggle("active");
        };

        div.appendChild(charSpan);
        div.appendChild(btn);
        grid.appendChild(div);
    });
}

/* PANEL GRID 12 CỘT */

function togglePanel() {
    const panel = document.getElementById("panel");
    panel.style.display = panel.style.display === "none" ? "grid" : "none";
}

function renderPanel() {
    const panel = document.getElementById("panel");
    panel.innerHTML = "";

    data.forEach((item, index) => {
        const cell = document.createElement("div");
        cell.className = "panel-item";

        const span = document.createElement("span");
        span.textContent = item;

        // edit
        span.onclick = () => {
            const input = document.createElement("input");
            input.value = item;

            input.onblur = () => {
                data[index] = input.value.trim() || item;
                save();
                render();
                renderPanel();
            };

            cell.innerHTML = "";
            cell.appendChild(input);
            input.focus();
        };

        // delete
        const del = document.createElement("div");
        del.className = "delete-btn";
        del.textContent = "✕";

        del.onclick = (e) => {
            e.stopPropagation();
            data.splice(index, 1);
            save();
            render();
            renderPanel();
        };

        cell.appendChild(span);
        cell.appendChild(del);
        panel.appendChild(cell);
    });
}

function clearAll() {
    if (confirm("Xóa toàn bộ?")) {
        data = [];
        save();
        render();
        renderPanel();
    }
}

render();
renderPanel();
</script>

</body>
</html>
