<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Han Cloud v6</title>

<!-- ROBOTO -->
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
@font-face {
    font-family: 'FZKai';
    src: url('https://allandk2002-blip.github.io/LIST-OF-HANZI/HANTU%20TEXT/Fonts/Fang%20zheng%20Kai%20ti%20Font-Simplified%20Chinese.ttf') format('truetype');
}

body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #eee;
    margin-bottom: 80px;
}

.container {
    width: 90%;
    max-width: 900px;
    margin: auto;
    padding-top: 40px;
}

/* INPUT */
#input {
    width: 100%;
    min-height: 80px;
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 10px;
    outline: none;
}

/* highlight chữ mới */
mark.new {
    background: white;
    color: black;
}

/* buttons */
.buttons {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

button {
    padding: 8px 14px;
    background: #333;
    border: none;
    color: white;
    cursor: pointer;
}

/* GRID 6 CỘT */
.grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
}

.card {
    position: relative;
    background: #1a1a1a;
    border: 1px solid #333;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    cursor: pointer;
    font-family: 'FZKai', 'KaiTi', 'STKaiti', serif;
}

.card.active {
    background: #fff;
    color: #000;
}

.shuffle-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #666;
    cursor: pointer;
}

/* PANEL dùng ROBOTO */
.panel {
    margin-top: 20px;
    display: none;
    grid-template-columns: repeat(12, 1fr);
    gap: 5px;
}

.panel-item {
    position: relative;
    background: #1a1a1a;
    border: 1px solid #333;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: 'Roboto', sans-serif;
}

.delete-btn {
    position: absolute;
    top: 0;
    right: 2px;
    font-size: 12px;
    color: red;
    display: none;
    cursor: pointer;
}

.panel-item:hover .delete-btn {
    display: block;
}
</style>
</head>

<body>

<div class="container">

<div id="input" contenteditable="true"></div>

<div class="buttons">
    <button onclick="addText()">Thêm</button>
    <button onclick="render()">Shuffle</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="togglePanel()">Quản lý</button>
    <button onclick="copyAll()">Copy All</button>
</div>

<div class="panel" id="panel"></div>
<div class="grid" id="grid"></div>

</div>

<script>
let data = Array.from(new Set(JSON.parse(localStorage.getItem("hanzi")) || []));
let pinned = null;

function save() {
    localStorage.setItem("hanzi", JSON.stringify(data));
}

function isHan(char) {
    return /[\u4e00-\u9fff]/.test(char);
}

/* ===== HIGHLIGHT CHỈ CHỮ MỚI ===== */
document.getElementById("input").addEventListener("input", () => {
    const el = document.getElementById("input");
    const text = el.innerText;

    let result = "";
    for (let char of text) {
        if (!isHan(char)) {
            result += char;
        } else if (!data.includes(char)) {
            result += `<mark class="new">${char}</mark>`;
        } else {
            result += char;
        }
    }

    el.innerHTML = result;

    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
});

/* ===== ADD ===== */
function addText() {
    const text = document.getElementById("input").innerText;

    let arr = [...text].filter(c => isHan(c));

    data = Array.from(new Set([...data, ...arr]));

    save();
    render();
    renderPanel();

    document.getElementById("input").innerHTML = "";
}

/* ===== GRID ===== */
function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let display = [...data];

    if (pinned) {
        display = [pinned, ...display.filter(x => x !== pinned)];
    }

    display = display.sort(() => Math.random() - 0.5).slice(0, 60);

    display.forEach((item) => {
        const div = document.createElement("div");
        div.className = "card";
        div.textContent = item;

        const btn = document.createElement("div");
        btn.className = "shuffle-btn";

        btn.onclick = (e) => {
            e.stopPropagation();
            div.textContent = data[Math.floor(Math.random() * data.length)];
            div.appendChild(btn);
        };

        div.onclick = () => {
            div.classList.toggle("active");
        };

        div.appendChild(btn);
        grid.appendChild(div);
    });
}

/* ===== PANEL ===== */
function togglePanel() {
    const panel = document.getElementById("panel");
    panel.style.display = panel.style.display === "none" ? "grid" : "none";
}

function renderPanel() {
    const panel = document.getElementById("panel");
    panel.innerHTML = "";

    data.forEach((item, index) => {
        const cell = document.createElement("div");
        cell.className = "panel-item";
        cell.textContent = item;

        cell.onclick = () => {
            pinned = item;
            render();
        };

        const del = document.createElement("div");
        del.className = "delete-btn";
        del.textContent = "✕";

        del.onclick = (e) => {
            e.stopPropagation();
            data.splice(index, 1);
            data = Array.from(new Set(data));
            save();
            render();
            renderPanel();
        };

        cell.appendChild(del);
        panel.appendChild(cell);
    });
}

/* ===== COPY ALL ===== */
function copyAll() {
    const text = data.join(" ");

    const textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);

    textarea.select();
    document.execCommand("copy");

    document.body.removeChild(textarea);

    alert("Đã copy!");
}

/* ===== CLEAR ===== */
function clearAll() {
    if (confirm("Xóa toàn bộ?")) {
        data = [];
        pinned = null;
        save();
        render();
        renderPanel();
    }
}

render();
renderPanel();
</script>

</body>
</html>
